name: Build Mac App

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install
      - name: Build Mac app
        run: npm run dist
      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: MacApp
          path: dist/*.dmg
