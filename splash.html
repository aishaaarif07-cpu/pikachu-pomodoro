<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Made by Ayesha Arif 💛</title>
    <style>
        /* Make full window background transparent */
        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Comic Sans MS', cursive, sans-serif;
        }

        /* Container for text and sparkle */
        .splash-container {
            text-align: center;
            color: #FFD700;
            /* Pikachu yellow */
            font-size: 28px;
            font-weight: bold;
            text-shadow: 0 0 10px #FFD700, 0 0 20px #FFA500;
            position: relative;
            animation: pulse 1.5s ease-in-out infinite;
        }

        /* Sparkle effect */
        .sparkle {
            position: absolute;
            top: -10px;
            right: -10px;
            width: 15px;
            height: 15px;
            background: radial-gradient(circle, #FFF 0%, #FFD700 70%);
            border-radius: 50%;
            animation: sparkleAnim 1.5s linear infinite;
        }

        @keyframes sparkleAnim {

            0%,
            100% {
                transform: scale(1) rotate(0deg);
                opacity: 1;
            }

            50% {
                transform: scale(1.5) rotate(180deg);
                opacity: 0.5;
            }
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.05);
            }
        }
    </style>
</head>

<body>
    <div class="splash-container">
        Made by Ayesha Arif 💛
        <div class="sparkle"></div>
    </div>
</body>

</html>
